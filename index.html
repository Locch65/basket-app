.menu-button {

}         

        .menu-button i {

#live-text {

    display: block;
    width: 100%; /* Occupa tutto lo spazio */

}

        .menu-button span {

        /* --- STATO LIVE ATTIVO --- */
        .menu-button.live-active {
            border: 2px solid #ff0000;
            pointer-events: auto;
            opacity: 1;
        }

        .menu-button.live-active i {
            color: #ff0000;
            animation: pulse 2s infinite;
        }

        /* --- STATO LIVE DISATTIVATO --- */
        .menu-button.live-off {
            opacity: 0.4;
            pointer-events: none;
            /* Rende il bottone insensibile */
            filter: grayscale(1);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.05);
            }

            100% {

            }

            }

        let liveMatchData = null; // Memorizza i dati della partita live corrente

        async function verificaNovitaAllenamenti() {
            const badge = document.getElementById("badge-allenamenti");
            const testoPrecedente = localStorage.getItem("cache_allenamenti") || "";

            try {
                const params = new URLSearchParams({
                    sheet: "Allenamenti",
                    userId: userId,
                    action: "GetAllenamenti", 
                    details: JSON.stringify(getDeviceData) 
                });

                const response = await fetch(`${url}?${params.toString()}`);
                const result = await response.json();

                if (result.status === "success" && result.data) {
                    const nuovoTesto = generaCalendario(result.data).trim();
                    
                    
                    // Se il testo è diverso dalla cache, mostra il badge
                    if (nuovoTesto !== testoPrecedente.trim()) {
                        badge.style.display = "block";
                    }
                }
            } catch (e) {
                console.error("Errore nel controllo news allenamenti:", e);
            }
        }

        function generaCalendario(rows) {
            if (!rows || rows.length === 0) return "";

            const oggi = new Date();
            oggi.setHours(0, 0, 0, 0);

            const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", 
                            "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
            const giorniSettimana = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];

            const parseData = (str) => {
                const [g, m, a] = str.split('/').map(Number);
                return new Date(a, m - 1, g);
            };

            const getWeekNumber = (d) => {
                const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
                date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
                const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
                return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
            };

            let html = "";
            let ultimaSettimanaIdentificata = null;

            rows.forEach((row, index) => {
                const dataEvento = parseData(row[0]);
                const descrizione = row[1];
                const numSettimana = getWeekNumber(dataEvento);

                // --- LOGICA SEZIONI SETTIMANA ---
                if (numSettimana !== ultimaSettimanaIdentificata) {
                const righeSettimana = rows.filter(r => getWeekNumber(parseData(r[0])) === numSettimana);
                const dInizio = parseData(righeSettimana[0][0]);
                const dFine = parseData(righeSettimana[righeSettimana.length - 1][0]);

                let titoloSettimana = "";

                if (dInizio.getFullYear() !== dFine.getFullYear()) {
                    // Caso: Cambio Anno (es. 28 Dic 2025 - 3 Gen 2026)
                    titoloSettimana = `${dInizio.getDate()} ${mesi[dInizio.getMonth()]} ${dInizio.getFullYear()} - ${dFine.getDate()} ${mesi[dFine.getMonth()]} ${dFine.getFullYear()}`;
                } else if (dInizio.getMonth() !== dFine.getMonth()) {
                    // Caso: Cambio Mese (es. 30 Marzo - 5 Aprile 2026)
                    titoloSettimana = `${dInizio.getDate()} ${mesi[dInizio.getMonth()]} - ${dFine.getDate()} ${mesi[dFine.getMonth()]} ${dFine.getFullYear()}`;
                } else {
                    // Caso standard: Stesso mese (es. 2-7 Marzo 2026)
                    titoloSettimana = `${dInizio.getDate()}-${dFine.getDate()} ${mesi[dInizio.getMonth()]} ${dInizio.getFullYear()}`;
                }

                if (ultimaSettimanaIdentificata !== null) html += "<br><br>";
                html += `<u><b>SETTIMANA ${titoloSettimana}</b></u><br><br>`;
                ultimaSettimanaIdentificata = numSettimana;
                }

                // --- FORMATTAZIONE RIGA ---
                const giornoNome = giorniSettimana[dataEvento.getDay()];
                const giornoNumero = dataEvento.getDate();
                
                let contenutoRiga = `<b>${giornoNome} ${giornoNumero}</b> - ${descrizione}`;

                if (dataEvento.getTime() === oggi.getTime()) {
                contenutoRiga = `<mark>${contenutoRiga}</mark>`;
                } else if (dataEvento < oggi) {
                contenutoRiga = `<s>${contenutoRiga}</s>`;
                }

                html += contenutoRiga;

                if (index < rows.length - 1) {
                const prossimaData = parseData(rows[index+1][0]);
                if (getWeekNumber(prossimaData) === numSettimana) {
                    html += "<br><br>";
                }
                }
            });

            return html;
        }

        // Funzione per gestire il click sul Live
        function GotoLive() {
            if (liveMatchData) {
                const p = liveMatchData;

                // Salvataggio dati richiesti nel localStorage
                localStorage.setItem("matchId", p.matchId || "");
                localStorage.setItem("teamA", p.squadraA || "");
                localStorage.setItem("teamB", p.squadraB || "");
                localStorage.setItem("puntiSquadraA", p.punteggioA || 0);
                localStorage.setItem("puntiSquadraB", p.punteggioB || 0);
                localStorage.setItem("convocazioni", p.convocazioni || "");
                localStorage.setItem("videoURL", p.videoURL || "");
                localStorage.setItem("videoId", extractYouTubeId(p.videoURL));
                localStorage.setItem("matchStartTime", extractYoutubeTime(p.videoURL));
                localStorage.setItem("oraInizioDiretta", p.oraInizioDiretta || "");
                localStorage.setItem("isLive", p.isLive || false);
                localStorage.setItem("statoPartita", p.statoPartita || "");

                // Reindirizzamento
                window.location.href = "direttavideo.html?matchId=" + encodeURIComponent(p.matchId);
            }
        }

        function checkLiveStatus() {
            const btnLive = document.getElementById("btn-live");
            const txtLive = document.getElementById("live-text");
            const isAdmin = localStorage.getItem("isAdmin") === "true"; // Recuperiamo il ruolo

            const params = new URLSearchParams({
                sheet: "Partite",
                userId: userId,
                action: "Get Partite Live",
                details: JSON.stringify(getDeviceData)
            });
            fetch(`${url}?${params.toString()}`)
                .then(res => res.json())
                .then(data => {
                    let partite = Array.isArray(data) ? data : data.data;

                    // Aggiorna la cache delle partite (quelle visualizzate nel calendario) con i nuovi dati freschi
                    localStorage.setItem("cache_partite", JSON.stringify(partite));

                    // Cerchiamo la partita live, ma aggiungiamo il controllo sul matchId se non è admin
                    const match = partite.find(p => {
                        const isMatchLive = (p.isLive === "true" || p.isLive === true);

                        if (isAdmin) {
                            return isMatchLive; // L'admin vede tutto ciò che è live
                        } else {
                            // L'utente vede il live SOLO se è U14 o U15
                            const mId = String(p.matchId || "");
                            const isAuthorized = mId.includes("U14") || mId.includes("U15");
                            return isMatchLive && isAuthorized;
                        }
                    });

                    if (match) {
                        liveMatchData = match;
                        
                        // Recuperiamo i punteggi (mettiamo 0 se sono vuoti o non definiti)
                        const pA = match.punteggioA !== undefined && match.punteggioA !== "" ? match.punteggioA : 0;
                        const pB = match.punteggioB !== undefined && match.punteggioB !== "" ? match.punteggioB : 0;
                        
                        // Aggiorniamo il testo del bottone con Squadre e Punteggio
                        txtLive.innerHTML = `
                            ${match.squadraA}<br>vs<br>${match.squadraB}<br>
                            <span style="font-size: 2rem; color: #ff0000; display: block; margin-top: 5px;">
                                ${pA} - ${pB}
                            </span>
                        `;
                        
                        btnLive.classList.replace("live-off", "live-active");
                    } else {
                        liveMatchData = null;
                        txtLive.innerHTML = "Live";
                        btnLive.classList.replace("live-active", "live-off");
                    }                    
                })
                .catch(err => {
                    console.error("Errore:", err);
                    liveMatchData = null;
                    btnLive.classList.replace("live-active", "live-off");
                });

            // aggiorna anche Roster e statistiche cosi' le troviamo già pronte se si seleziona il bottone relativo    
            // Aggiorna anche Roster e statistiche
            aggiornaDatiRosterEStats().then(dati => {
                if (isAdmin) {
                    // 1. Trasformiamo i dati in stringa per confrontarli
                    const datiString = JSON.stringify(dati.roster);
                    
                    // 2. Recuperiamo l'ultima versione salvata in locale
                    const lastSaved = localStorage.getItem("last_roster_firebase_sync");

                    // 3. Verifichiamo se la funzione esiste E se i dati sono cambiati
                    if (datiString !== lastSaved) {
                        console.log("Dati roster cambiati. Aggiorno Firebase...");
                        
                        saveToFirebaseRoster('roster/', dati.roster);
                        
                        // 4. Aggiorniamo il "checkpoint" nel localStorage
                        localStorage.setItem("last_roster_firebase_sync", datiString);
                    } 
                }
            });        
        }

        // Funzioni Popup
        function mostraPopup() { document.getElementById('customPopup').style.display = 'flex'; }
        function chiudiPopup() { document.getElementById('customPopup').style.display = 'none'; }

        // Sostituisci le chiamate dirette alle funzioni con questo blocco:

        async function initApp() {
            try {
                await registerUserId(); 
                
                // --- GESTIONE LOGIN SEGRETO ---
                const logo = document.getElementById("logo-admin");
                if (logo) {
                    let lastTap = 0;
                    
                    // Usiamo 'click' perché funziona ovunque, ma ne misuriamo la velocità
                    logo.addEventListener('click', function (e) {
                        const now = new Date().getTime();
                        const timesince = now - lastTap;
                        
                        // Se il tempo tra due click è meno di 300ms, lo consideriamo doppio click
                        if (timesince < 300 && timesince > 0) {
                            Login(); 
                        }
                        
                        lastTap = now;
                    });
                }

                checkLiveStatus();
                verificaNovitaAllenamenti();

                setInterval(checkLiveStatus, 10000);
                
            } catch (error) {
                console.error("Errore durante l'inizializzazione:", error);
            }
        }

        // Avvia tutto quando il DOM è pronto
        document.addEventListener("DOMContentLoaded", initApp);

        window.onclick = function (event) {
            let popup = document.getElementById('customPopup');
            if (event.target == popup) chiudiPopup();
        }
